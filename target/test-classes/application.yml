spring:
  application:
    name: fx-csv-component-tests

  artemis:
    mode: native
    broker-url: tcp://localhost:61616
    user: artemis
    password: artemis
    embedded:
      enabled: false

  datasource:
    url: jdbc:h2:tcp://localhost:9092/mem:fxpayments
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  jms:
    template:
      receive-timeout: 5000     # 5s – generous to allow AUT processing time

fx:
  component:
    test:
      # Folder scanned for CSV test-case files (override via -Dtest.data.dir)
      test-data-dir: ${test.data.dir:src/test/resources/test-data}
      # Max time to wait for each message to be processed (seconds)
      message-timeout-seconds: 15
      # Timestamp freshness window: domain payment must be <= N minutes old
      timestamp-freshness-minutes: 5
      # Output directory for HTML and CSV reports
      report-dir: ${report.dir:target/component-test-report}

logging:
  level:
    com.fx.csvtest: DEBUG
    com.fx.payment: INFO
    org.springframework.jms: WARN
    org.apache.activemq: WARN
